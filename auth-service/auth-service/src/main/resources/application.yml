server:
  port: 8087

spring:
  application:
    name: auth-service

  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/auth_db}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_URL:http://localhost:8761/eureka}"

    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: "${JWT_SECRET:MyVeryLongSuperSecretJwtKeyForLibraryManagementSystem2026SecureTokenGeneration}"
  expiration: "${JWT_EXPIRATION:86400000}"

internal:
  api:
    key: "${INTERNAL_API_KEY:BiblioInternalCommunicationKey2026Secure}"

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.library.auth_service: DEBUG

app:
  bootstrap:
    admin:
      enabled: "${BOOTSTRAP_ADMIN_ENABLED:false}"
      name: "${BOOTSTRAP_ADMIN_NAME:}"
      email: "${BOOTSTRAP_ADMIN_EMAIL:}"
      password: "${BOOTSTRAP_ADMIN_PASSWORD:}"
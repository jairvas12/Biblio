server.port=8081
spring.application.name=user-service

# =========================================================
# MYSQL CONFIGURATION
# =========================================================

spring.datasource.url=jdbc:mysql://localhost:3306/user_db

spring.datasource.username=root

spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA
# =========================================================
jwt.secret=${JWT_SECRET:MyVeryLongSuperSecretJwtKeyForLibraryManagementSystem2026SecureTokenGeneration}
internal.api.key=${INTERNAL_API_KEY:BiblioInternalCommunicationKey2026Secure}
jwt.expiration=86400000
spring.jpa.hibernate.ddl-auto=update
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# =========================================================
# EUREKA
# =========================================================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# =========================================================
# SWAGGER
# =========================================================

springdoc.api-docs.enabled=true

springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

# =========================================================
# LOGGING
# =========================================================

logging.level.root=INFO

logging.level.com.library.user_service=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
spring:
  application:
    name: category-service

  datasource:
    url: jdbc:h2:mem:category_test_db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

    generate-ddl: true
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: MyVeryLongSuperSecretJwtKeyForLibraryManagementSystem2026SecureTokenGeneration

server:
  port: 8083

spring:
  application:
    name: category-service

  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/category_db}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_URL:http://localhost:8761/eureka}"
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: "${JWT_SECRET:MyVeryLongSuperSecretJwtKeyForLibraryManagementSystem2026SecureTokenGeneration}"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.library.category_service: DEBUG

server:
  port: 0

spring:
  application:
    name: book-service

  datasource:
    url: jdbc:h2:mem:book_test_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    org.hibernate.SQL: OFF
    org.springframework.cloud.netflix.eureka: OFF

server:
  port: 8086

spring:
  application:
    name: copia-service

  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3307/library_copias?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_URL:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.library.copia_service: INFO
    org.hibernate.SQL: DEBUG
jwt:
  secret: "${JWT_SECRET:MyVeryLongSuperSecretJwtKeyForLibraryManagementSystem2026SecureTokenGeneration}"

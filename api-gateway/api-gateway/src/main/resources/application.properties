server.port=8080

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[2].id=book-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://BOOK-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/books/**

spring.cloud.gateway.server.webflux.routes[3].id=find-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://FIND-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/find/**

spring.cloud.gateway.server.webflux.routes[4].id=category-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://CATEGORY-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/categories/**

spring.cloud.gateway.server.webflux.routes[5].id=copia-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://COPIA-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/copias/**